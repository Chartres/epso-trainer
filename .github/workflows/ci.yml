name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run validate-data
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Cloudflare Pages: production on main, preview URL on claude/** branches.
  # Needs repo secrets CLOUDFLARE_API_TOKEN (Account.Pages:Edit) + CLOUDFLARE_ACCOUNT_ID.
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Ensure Pages project exists (idempotent)
        run: npx wrangler@4 pages project create epso-trainer --production-branch=main 2>/dev/null || true
      - name: Deploy
        run: npx wrangler@4 pages deploy dist --project-name=epso-trainer --branch="${{ github.ref_name }}" | tee deploy.log
      - name: Attach custom domain + DNS (idempotent, soft-fail)
        if: github.ref == 'refs/heads/main'
        run: |
          node <<'EOF' || true
          const API = 'https://api.cloudflare.com/client/v4'
          const H = { Authorization: `Bearer ${process.env.CLOUDFLARE_API_TOKEN}`, 'Content-Type': 'application/json' }
          const acct = process.env.CLOUDFLARE_ACCOUNT_ID
          const call = async (url, opts = {}) => (await fetch(url, { headers: H, ...opts })).json()
          const main = async () => {
            const dom = await call(`${API}/accounts/${acct}/pages/projects/epso-trainer/domains`, {
              method: 'POST', body: JSON.stringify({ name: 'epso.dravec.org' }),
            })
            // 8000018 = domain already attached — fine.
            const domOk = dom.success || (dom.errors ?? []).some((e) => e.code === 8000018)
            console.log('domain attach:', domOk ? 'ok' : JSON.stringify(dom.errors))
            const zones = await call(`${API}/zones?name=dravec.org`)
            const zone = zones.result?.[0]?.id
            if (!zone) { console.log('zone lookup failed (token needs Zone:Read + DNS:Edit):', JSON.stringify(zones.errors ?? zones)); return }
            const recs = await call(`${API}/zones/${zone}/dns_records?type=CNAME&name=epso.dravec.org`)
            if (recs.result?.length) { console.log('CNAME already exists'); return }
            const rec = await call(`${API}/zones/${zone}/dns_records`, {
              method: 'POST',
              body: JSON.stringify({ type: 'CNAME', name: 'epso', content: 'epso-trainer.pages.dev', proxied: true }),
            })
            console.log('CNAME create:', rec.success ? 'ok' : JSON.stringify(rec.errors))
          }
          main().catch((e) => console.log('soft-fail:', e.message))
          EOF
